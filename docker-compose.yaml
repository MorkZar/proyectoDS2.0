version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: src/app/Dockerfile
    ports:
      - "4201:80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: src/Backend/Dockerfile
    ports:
      - "8081:80"
    volumes:
      - ./src/Backend:/var/www/html
    env_file:
      - env/conecton.env
    environment:
      - DB_HOST=db
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - env/conecton.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network


networks:
  app-network:

volumes:
  postgres_data: